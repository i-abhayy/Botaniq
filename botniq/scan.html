<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botaniq - AI Plant Doctor</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef7ea, #d9f1d0);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone {
      width: 340px;
      height: 680px;
      background: #111;
      border: 8px solid #111;
      border-radius: 35px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 22px;
      background: #111;
      border-radius: 20px;
      z-index: 20;
    }

    .screen-content {
      height: 100%;
      overflow-y: auto;
      padding: 50px 14px 95px;
      scroll-behavior: smooth;
      background:
        linear-gradient(rgba(9, 11, 10, 0.88), rgba(9, 11, 10, 0.93)),
        url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
      color: #f4e7b2;
    }

    .screen-content::-webkit-scrollbar {
      width: 4px;
    }

    .screen-content::-webkit-scrollbar-thumb {
      background: #74b36d;
      border-radius: 10px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-top: 10px;
    }

    .header-bar h1 {
      font-size: 22px;
      color: #f4e7b2;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .top-icons {
      display: flex;
      gap: 14px;
      font-size: 19px;
      color: #e8ddb0;
      cursor: pointer;
    }

    .search-box {
      display: none;
      margin-bottom: 15px;
      animation: fadeIn 0.3s ease;
    }

    .search-box.active {
      display: block;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(224, 201, 104, 0.14);
      border-radius: 14px;
      outline: none;
      font-size: 14px;
      color: #f4e7b2;
      background: rgba(20, 22, 18, 0.82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .search-box input::placeholder {
      color: #bfb58f;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #f5e9bc;
    }

    .glass-card {
      background: rgba(20, 22, 18, 0.75);
      border: 1px solid rgba(224, 201, 104, 0.12);
      border-radius: 18px;
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.28),
        inset 0 0 0 1px rgba(255,255,255,0.02);
      backdrop-filter: blur(6px);
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow:
        0 15px 30px rgba(0,0,0,0.38),
        0 0 18px rgba(155, 232, 61, 0.12);
    }

    .glass-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
    }

    .glass-card:hover::after {
      animation: shine 0.8s ease forwards;
    }

    @keyframes shine {
      100% {
        left: 130%;
      }
    }

    .doctor-box {
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .doctor-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .diagnose-wrap {
      padding: 14px;
      display: flex;
      justify-content: center;
      background: rgba(20, 22, 18, 0.85);
    }

    .diagnose-btn {
      border: none;
      padding: 14px 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #83c13b, #386c20);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 18px rgba(107, 177, 53, 0.24);
    }

    .diagnose-btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 10px 22px rgba(131, 193, 59, 0.3);
    }

    .upload-box {
      padding: 16px;
      margin-bottom: 18px;
      border-radius: 18px;
    }

    .upload-btn {
      width: 100%;
      padding: 14px;
      border: 2px dashed rgba(147, 214, 88, 0.6);
      background: rgba(125, 184, 58, 0.08);
      color: #ebdfb1;
      border-radius: 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.3s ease;
    }

    .upload-btn:hover {
      background: rgba(125, 184, 58, 0.14);
      transform: translateY(-2px);
    }

    .upload-text {
      font-size: 13px;
      color: #d7cca3;
      line-height: 1.5;
      text-align: center;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin: 8px 0 14px;
      color: #f1e5b5;
    }

    .problems-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .problem-card {
      min-height: 105px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 16px;
      background: rgba(20, 22, 18, 0.75);
      border: 1px solid rgba(224, 201, 104, 0.12);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.02);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .problem-card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow:
        0 15px 30px rgba(0,0,0,0.38),
        0 0 18px rgba(155, 232, 61, 0.12);
    }

    .problem-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
    }

    .problem-card:hover::after {
      animation: shine 0.8s ease forwards;
    }

    .problem-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .problem-title {
      font-size: 15px;
      font-weight: 700;
      color: #f0e3b3;
      line-height: 1.3;
    }

    .co2-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(63, 94, 28, 0.45), rgba(212, 183, 77, 0.08));
      border: 1px solid rgba(224, 201, 104, 0.1);
      color: #f0e4b6;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: 0.35s ease;
    }

    .co2-strip:hover {
      transform: translateY(-4px);
      box-shadow:
        0 12px 24px rgba(0,0,0,0.25),
        0 0 16px rgba(155, 232, 61, 0.1);
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 78px;
      background: linear-gradient(180deg, #2f8a2d, #14651f);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -6px 18px rgba(0, 0, 0, 0.18);
      padding: 8px 6px;
      z-index: 15;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      padding: 8px 4px;
      border-radius: 14px;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .nav-item i {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .nav-item span {
      font-size: 12px;
      font-weight: 600;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    #leafInput {
      display: none;
    }
  .problems-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }

  .problem-card {
    min-height: 170px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    text-align: center;
    border-radius: 16px;
    background: rgba(20, 22, 18, 0.75);
    border: 1px solid rgba(224, 201, 104, 0.12);
    box-shadow:
      0 8px 20px rgba(0, 0, 0, 0.22),
      inset 0 0 0 1px rgba(255,255,255,0.02);
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .problem-card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow:
      0 15px 30px rgba(0,0,0,0.38),
      0 0 18px rgba(155, 232, 61, 0.12);
  }

  .problem-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 55%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
  }

  .problem-card:hover::after {
    animation: shine 0.8s ease forwards;
  }

  .problem-img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    margin-bottom: 10px;
  }

  .problem-title {
    font-size: 15px;
    font-weight: 700;
    color: #f0e3b3;
    line-height: 1.3;
  }
  </style>
</head>
<body>

  <div class="phone">
    <div class="notch"></div>

    <div class="screen-content">
      <div class="header-bar">
        <h1>AI Plant Doctor</h1>
        <div class="top-icons">
          <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        </div>
      </div>

      <div class="search-box" id="searchBox">
        <input type="text" placeholder="Search plant problem..." id="searchInput">
      </div>

      <div class="question">What’s wrong with my plant?</div>

      <div class="doctor-box glass-card">
        <img
          class="doctor-image"
          src="ai plant.png"
          alt="Plant Diagnosis"
        >
        <div class="diagnose-wrap">
          <button class="diagnose-btn">Diagnose</button>
        </div>
      </div>

      <div class="upload-box glass-card">
        <button class="upload-btn" id="uploadBtn">
          <i class="fa-solid fa-upload"></i> Upload Leaf Image
        </button>

        <input
          type="file"
          id="leafInput"
          accept="image/*"
          capture="environment"
        >

        <p class="upload-text">
          Upload a clear photo of the leaf to detect disease, yellowing, spots, or pest infection.
        </p>
      </div>

      <h2 class="section-title">Common Plant Problems</h2>

<div class="problems-grid">
  <div class="problem-card">
    <img class="problem-img" src="yellowleaves.png" alt="Yellow Leaves">
    <div class="problem-title">Yellow Leaves</div>
  </div>

  <div class="problem-card">
    <img class="problem-img" src="spot.png" alt="Spots on Leaves">
    <div class="problem-title">Spots on Leaves</div>
  </div>

  <div class="problem-card">
    <img class="problem-img" src="wilting.png" alt="Wilting Plant">
    <div class="problem-title">Wilting Plant</div>
  </div>

  <div class="problem-card">
    <img class="problem-img" src="pest.png" alt="Pest Infection">
    <div class="problem-title">Pest Infection</div>
  </div>
</div>

      <div class="co2-strip">
        <span>🌿</span>
        <span>12g of CO₂ captured daily</span>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="doctor.html" class="nav-item active">
        <i class="fa-solid fa-camera"></i>
        <span>Scan</span>
      </a>

      <a href="dashboard.html" class="nav-item">
        <i class="fa-solid fa-microchip"></i>
        <span>Dashboard</span>
      </a>

      <a href="community.html" class="nav-item">
        <i class="fa-solid fa-users"></i>
        <span>Community</span>
      </a>
    </nav>
  </div>

  <script>
    const uploadBtn = document.getElementById("uploadBtn");
    const leafInput = document.getElementById("leafInput");
    const searchIcon = document.getElementById("searchIcon");
    const searchBox = document.getElementById("searchBox");
    const searchInput = document.getElementById("searchInput");

    uploadBtn.addEventListener("click", () => {
      leafInput.click();
    });

    leafInput.addEventListener("change", () => {
      if (leafInput.files.length > 0) {
        alert("Image selected: " + leafInput.files[0].name);
      }
    });

    searchIcon.addEventListener("click", () => {
      searchBox.classList.toggle("active");

      if (searchBox.classList.contains("active")) {
        searchInput.focus();
      }
    });
  </script>

</body>
</html>

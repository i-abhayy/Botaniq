<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botaniq</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef7ea, #d9f1d0);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone {
      width: 340px;
      height: 680px;
      background: #f8fbf6;
      border: 8px solid #111;
      border-radius: 35px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .top-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 22px;
      background: #111;
      border-radius: 20px;
      z-index: 20;
    }

    .screen-content {
      height: 100%;
      overflow-y: auto;
      padding: 50px 14px 95px;
      background: linear-gradient(to bottom, #f7fbf4, #edf7e8);
      scroll-behavior: smooth;
    }

    .screen-content::-webkit-scrollbar {
      width: 4px;
    }

    .screen-content::-webkit-scrollbar-thumb {
      background: #74b36d;
      border-radius: 10px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .plant-box {
      position: relative;
      width: 100%;
      height: 230px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .plant-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
    }

    .plant-box:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.2);
    }

    .plant-box:hover img {
      transform: scale(1.08);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px;
      color: white;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.12));
    }

    .overlay h2 {
      font-size: 24px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .overlay p {
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 12px;
      max-width: 90%;
    }

    .overlay button {
      width: fit-content;
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2f8a2d, #14651f);
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .overlay button:hover {
      transform: scale(1.06);
      background: linear-gradient(135deg, #39a536, #1b7a27);
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 78px;
      background: linear-gradient(180deg, #2f8a2d, #14651f);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -6px 18px rgba(0, 0, 0, 0.18);
      padding: 8px 6px;
      z-index: 15;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      padding: 8px 4px;
      border-radius: 14px;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .nav-item i {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .nav-item span {
      font-size: 12px;
      font-weight: 600;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="top-bar"></div>

    <main class="screen-content">
      <div class="container">

        <div class="plant-box">
          <img src="neem.jpg" alt="Neem">
          <div class="overlay">
            <h2>Neem</h2>
            <p>Powerful medicinal plant with antibacterial properties.</p>
            <button>Check Out Now</button>
          </div>
        </div>

        <div class="plant-box">
          <img src="tulsi.jpg" alt="Tulsi">
          <div class="overlay">
            <h2>Tulsi</h2>
            <p>Boosts immunity and supports respiratory health.</p>
            <button>Check Out Now</button>
          </div>
        </div>

        <div class="plant-box">
          <img src="jasmine.jpg" alt="Jasmine">
          <div class="overlay">
            <h2>Jasmine</h2>
            <p>Fragrant flower known for calming effects.</p>
            <button>Check Out Now</button>
          </div>
        </div>

        <div class="plant-box">
          <img src="hisbiscus.jpg" alt="Hibiscus">
          <div class="overlay">
            <h2>Hibiscus</h2>
            <p>Supports hair health and overall wellness.</p>
            <button>Check Out Now</button>
          </div>
        </div>

      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="scan.html" class="nav-item">
  <i class="fa-solid fa-camera"></i>
  <span>Scan</span>
</a>

      <a href="dashboard.html" class="nav-item">
        <i class="fa-solid fa-microchip"></i>
        <span>Dashboard</span>
      </a>
      

      <a href="coummunity.html" class="nav-item">
        <i class="fa-solid fa-users"></i>
        <span>Community</span>
      </a>
    </nav>
  </div>

</body>
</html>
